# https://docs.docker.com/guides/gha/
# https://github.com/redhat-actions/oc-login

name: Build image and deploy on OpenShift

#on:
#  push:
#    branches:
#      - main

env:
  APP_NAME: vodafone-ziggo-demo
  IMAGE_NAME: devops-challenge
  CONTAINER_NAME: devops-challenge

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build test image
        run: docker build -t devops-challenge:test .

      - name: Run smoke test for nginx
        run: |
          docker run -d --name devops-test devops-challenge:test

          for i in {1..10}; do
            if docker exec devops-test wget -qO- http://127.0.0.1:8080 | grep "Hello DevOps"; then
              echo "Smoke test passed"
              docker rm -f devops-test
              exit 0
            fi

            echo "Waiting for nginx..."
            docker logs devops-test
            sleep 1
          done

          echo "Smoke test failed"
          docker logs devops-test
          docker rm -f devops-test
          exit 1
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: devops-challenge:test
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-on-openshift:
    runs-on: ubuntu-latest
    needs: build-and-push-image

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Log in to openshift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          namespace: ${{ vars.OPENSHIFT_NAMESPACE }}
      
      - name: Apply OpenShift manifests
        run: oc apply -f manifests/ -n "${{ vars.OPENSHIFT_NAMESPACE }}"
      
      - name: Deploy the new image
        run: |
          oc set image deployment/${{ env.APP_NAME }} \
          ${{ env.CONTAINER_NAME }}=${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          -n "${{ vars.OPENSHIFT_NAMESPACE }}"
      
      - name: Perform rollout with wait
        run: |
          oc rollout status deployment/${{ env.APP_NAME }} \
          -n "${{ vars.OPENSHIFT_NAMESPACE }}" \
          --timeout=60s

      - name: Rollback in case of failure
        if: failure()
        run: |
          echo "Deployment failed. Rolling back to previous ReplicaSet"
          oc rollout undo deployment/${{ env.APP_NAME }} \
            -n "${{ vars.OPENSHIFT_NAMESPACE }}"
          oc rollout status deployment/${{ env.APP_NAME }} \
          -n "${{ vars.OPENSHIFT_NAMESPACE }}" \
          --timeout=60s

      - name: Verify webpage is accessible
        run: |
          ROUTE_HOST=$(oc get route ${{ env.APP_NAME }} -n "${{ vars.OPENSHIFT_NAMESPACE }}" -o jsonpath='{.spec.host}')
          echo "Route: http://$ROUTE_HOST"
          curl -fsS "http://$ROUTE_HOST"


