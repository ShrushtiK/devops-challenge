name: Build image and update Helm values.yaml for GitOps

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'index.html'

permissions:
  contents: write

env:
  IMAGE_NAME: devops-challenge
  CONTAINER_NAME: devops-challenge

jobs:
  build-and-update:
    if: ${{ !contains(github.event.head_commit.message, 'Update image tag to') }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build test image
        run: docker build -t devops-challenge:test .

      - name: Run smoke test for nginx
        run: |
          docker run -d --name devops-test devops-challenge:test

          for i in {1..10}; do
            if docker exec devops-test wget -qO- http://127.0.0.1:8080 | grep "Hello DevOps"; then
              echo "Smoke test passed"
              docker rm -f devops-test
              exit 0
            fi

            echo "Waiting for nginx..."
            docker logs devops-test
            sleep 1
          done

          echo "Smoke test failed"
          docker logs devops-test
          docker rm -f devops-test
          exit 1

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: devops-challenge:test
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Update Helm values with new image
        run: |
          sed -i "s|repository: .*|repository: ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}|" "${{ env.VALUES_FILE }}"
          sed -i "s|tag: .*|tag: ${{ github.sha }}|" "${{ env.VALUES_FILE }}"
      
      - name: Commit updated Helm values
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet; then
            echo "No Helm values changes to commit"
            exit 0
          fi

          git add "${{ env.VALUES_FILE }}"
          git commit -m "Update image tag to ${{ github.sha }}"
          git push


  