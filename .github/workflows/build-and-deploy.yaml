name: Build image and deploy on OpenShift Sandbox

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'index.html'
      - 'helm/**'
      - '.github/workflows/build-and-deploy.yaml'

env:
  APP_NAME: vodafone-ziggo-demo
  IMAGE_NAME: devops-challenge

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build test image
        run: docker build -t ${{ env.IMAGE_NAME }}:test .

      - name: Run smoke test for nginx
        run: |
          docker run -d --name devops-test ${{ env.IMAGE_NAME }}:test

          for i in {1..10}; do
            if docker exec devops-test wget -qO- http://127.0.0.1:8080 | grep "Hello DevOps"; then
              echo "Smoke test passed"
              docker rm -f devops-test
              exit 0
            fi

            echo "Waiting for nginx..."
            docker logs devops-test
            sleep 1
          done

          echo "Smoke test failed"
          docker logs devops-test
          docker rm -f devops-test
          exit 1

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:test
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Tag and push validated image
        run: |
          docker tag \
            ${{ env.IMAGE_NAME }}:test \
            ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

          docker tag \
            ${{ env.IMAGE_NAME }}:test \
            ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

          docker push \
            ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

          docker push \
            ${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  deploy-on-openshift:
    runs-on: ubuntu-latest
    needs: build-and-push-image

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          namespace: ${{ vars.OPENSHIFT_NAMESPACE }}
      
      - name: Lint Helm chart
        run: helm lint helm/webserver

      - name: Perform Deployment
        run: |
          helm upgrade --install ${{ env.APP_NAME }} helm/webserver \
          --namespace "${{ vars.OPENSHIFT_NAMESPACE }}" \
          --set image.repository="${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}" \
          --set image.tag="${{ github.sha }}" \
          --rollback-on-failure \
          --timeout=60s

      - name: Verify webpage is accessible
        run: |
          ROUTE_HOST=$(oc get route ${{ env.APP_NAME }} -n "${{ vars.OPENSHIFT_NAMESPACE }}" -o jsonpath='{.spec.host}')
          echo "Route: http://$ROUTE_HOST"

          echo "Waiting for Route propagation..."
          sleep 45
          curl -fsS --retry-max-time 45 "http://$ROUTE_HOST"


