<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello DevOps O&Si</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background-color: #f4f7fb;
      color: #1f2937;
      text-align: center;
    }

    main {
      padding: 2rem;
    }

    h1 {
      margin-bottom: 0.75rem;
      font-size: 2.5rem;
    }

    p {
      margin: 0;
      font-size: 1.25rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello DevOps O&amp;Si -------- Shrushti Kaul</h1>
    <p id="date"></p>
  </main>

  <script>
    const today = new Date();
    const formattedDate = today.toLocaleDateString("en-GB", {
      day: "2-digit",
      month: "long",
      year: "numeric"
    });

    document.getElementById("date").textContent = `Date: ${formattedDate}`;
  </script>
</body>
</html>
